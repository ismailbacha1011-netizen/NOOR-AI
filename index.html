<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOOR AI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-950 text-white">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-72 bg-gray-900 border-r border-gray-800 p-4">
    <h1 class="text-2xl font-bold mb-4">NOOR AI</h1>

    <button class="w-full bg-blue-600 p-3 rounded-xl mb-4">
      + New Chat
    </button>

    <div id="chatHistory">
      <p class="text-gray-400">No Chats Yet</p>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col">

    <!-- Header -->
    <header class="border-b border-gray-800 p-4">
      <h2 class="text-xl font-semibold">
        Universal AI Assistant
      </h2>
    </header>

    <!-- Tabs -->
    <div class="flex border-b border-gray-800">
      <button class="p-4">Chat</button>
      <button class="p-4">Images</button>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-6">
      <div class="text-center mt-20">
        <h2 class="text-4xl font-bold">
          Welcome to NOOR AI
        </h2>
        <p class="text-gray-400 mt-2">
          Powered by OpenRouter
        </p>
      </div>
    </div>

    <!-- Input -->
    <div class="p-4 border-t border-gray-800">
      <div class="flex gap-2">
        <input
          id="messageInput"
          type="text"
          placeholder="Ask anything..."
          class="flex-1 bg-gray-800 p-3 rounded-xl"
        />

        <button
          onclick="sendMessage()"
          class="bg-blue-600 px-6 rounded-xl">
          Send
        </button>
      </div>
    </div>

  </main>

</div>

<script>
function sendMessage() {

  const input =
    document.getElementById("messageInput");

  const messages =
    document.getElementById("messages");

  if (!input.value) return;

  messages.innerHTML += `
    <div class="text-right mb-4">
      <div class="inline-block bg-blue-600 p-3 rounded-xl">
        ${input.value}
      </div>
    </div>
  `;

  input.value = "";
}
</script>

</body>
</html>
